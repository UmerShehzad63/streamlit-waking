name: Keep Streamlit Alive

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  wake:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Streamlit App
        uses: actions/checkout@v3

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium

      - name: Click wake button
        run: |
          python3 - <<'EOF'
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              page.goto("https://ai-powered-stock-evaluationthesis-um6.streamlit.app/", timeout=60000)
              try:
                  page.click("text=Yes, get this app back up!", timeout=15000)
                  page.wait_for_timeout(10000)
                  print("App woken up successfully")
              except:
                  print("App was already awake")
              browser.close()
          EOF
